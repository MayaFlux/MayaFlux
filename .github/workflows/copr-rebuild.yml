name: Trigger COPR Build

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for commits in last 24 hours
        id: check
        run: |
          CHANGES=$(git log --oneline --since="24 hours ago" origin/main)
          if [ -n "$CHANGES" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

  rebuild:
    needs: check_changes
    if: ${{ needs.check_changes.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Install copr-cli
        run: |
          python3 -m pip install --user copr-cli
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Trigger COPR Build
        run: |
          mkdir -p ~/.config
          cat <<'EOF' > ~/.config/copr
          [copr-cli]
          login = ${{ secrets.COPR_LOGIN }}
          username = ${{ secrets.COPR_USERNAME }}
          token = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedorainfracloud.org
          EOF

          ~/.local/bin/copr-cli \
            --config ~/.config/copr \
            buildscm ranjithshegde/mayaflux-dev \
            --clone-url https://github.com/MayaFlux/MayaFlux \
            --commit main \
            --spec packaging/fedora/mayaflux-dev.spec \
            --method rpkg --nowait
